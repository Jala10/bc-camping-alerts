name: Check BC Parks Availability

on:
  schedule:
    # Every 5 minutes — GitHub's minimum reliable interval (free on public repos)
    - cron: "*/5 * * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write   # Needed to commit seen.json back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch with token so we can push seen.json back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Check monitoring window
        id: season
        # Auto-stop: skips all work once config.MONITOR_END has passed
        run: |
          active=$(python -c "import config; from datetime import date; print(str(date.today() <= config.MONITOR_END).lower())")
          echo "active=$active" >> "$GITHUB_OUTPUT"
          echo "Monitoring window active: $active"

      - name: Install dependencies
        if: steps.season.outputs.active == 'true'
        run: pip install -r requirements.txt

      - name: Run availability check
        if: steps.season.outputs.active == 'true'
        env:
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          NTFY_TOPIC:           ${{ secrets.NTFY_TOPIC }}
          WHATSAPP_RECIPIENTS:  ${{ secrets.WHATSAPP_RECIPIENTS }}
        run: python check.py

      - name: Save state (commit seen.json if changed)
        if: steps.season.outputs.active == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "chore: update seen [skip ci]"
          git push
